name: weladti
description: "ولادتي — AI Pregnancy Health Platform"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.5

  # HTTP & Networking
  dio: ^5.4.3+1

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0

  # Fonts & Design
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  gap: ^3.0.1

  # UI Components
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0+3
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
